<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Tres Mariazinhas</title>\n    <style>\n        input:focus:invalid { border: 2px solid red; }\n        .loading { display: none; }\n        .success { display: none; }\n    </style>\n</head>\n<body>\n    <div id="app">\n        <!-- Form elements here -->\n    </div>\n    <script>\n        function sendWhatsAppMessage(itemPrice, totalPrice) {\n            const formattedItemPrice = itemPrice.toString().replace('.', ',');\n            const formattedTotalPrice = totalPrice.toString().replace('.', ',');\n            const message = `Item price: ${formattedItemPrice}, Total price: ${formattedTotalPrice}`;\n            // Add loading state logic here\n            document.querySelector('.loading').style.display = 'block';\n            // Simulate sending the message\n            setTimeout(() => {\n                document.querySelector('.loading').style.display = 'none';\n                document.querySelector('.success').style.display = 'block';\n            }, 2000);\n        }\n    </script>\n</body>\n</html>
